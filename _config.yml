# Site Settings
locale: "en-US"
site_theme: "default"
title: "Junteng Liu"
title_separator: "-"
name: "Junteng Liu"
description: "PhD Candidate in Computer Science at HKUST | NLP & ML Researcher"
url: https://tooalthon-user-3-cmyk.github.io/LJT-Homepage
baseurl: ""
repository: "tooalthon-user-3-cmyk/LJT-Homepage"

# Site Author
author:
  avatar: "profile.png"
  name: "Junteng Liu"
  bio: "First-year PhD Candidate at HKUST NLP Group. Research focuses on LLM reasoning, RL, truthfulness, interpretability, and VLM hallucination mitigation."
  location: "Hong Kong"
  employer: "Hong Kong University of Science and Technology"
  email: "jliugi@connect.ust.hk"
  
  # Academic websites
  googlescholar: "https://scholar.google.com/citations?hl=en&user=tbK9jl4AAAAJ&view_op=list_works&sortby=pubdate"
  github: "Vicent0205"
  
  # Social media
  twitter: "junteng88716710"

# Publication Category
publication_category:
  conferences:
    title: 'Conference Papers'
  journals:
    title: 'Journal Articles'

# Site Settings
teaser: 
read_more: "disabled"
comments:
  provider: false

atom_feed:
  hide: true

# SEO Related
google_site_verification:
bing_site_verification:

# Social Sharing
twitter:
  username: "junteng88716710"

social:
  type: Person
  name: Junteng Liu
  links:

# Analytics
analytics:
  provider: false

# Reading Files
include:
  - _pages
  - files
exclude:
  - ".sublime-project"
  - ".sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins/
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
  - _publications
  - _talks
  - _teaching
  - _portfolio
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:

# These settings control how pages are included in the site
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Etc/UTC

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Mimic GitHub Pages with --safe
whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
